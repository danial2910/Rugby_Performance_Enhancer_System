# ============================================================
#  AI-Powered Rugby Diet & Fitness Planner
#  Spring Boot Application Configuration
# ============================================================

# ── Server ───────────────────────────────────────────────────
server.port=8080

# ── MongoDB ──────────────────────────────────────────────────
# Make sure MongoDB is running locally on port 27017
spring.data.mongodb.uri=mongodb://localhost:27017/rugby_planner_db
spring.data.mongodb.database=rugby_planner_db

# Enable @CreatedDate / @LastModifiedDate auto-population
spring.data.mongodb.auto-index-creation=true

# ── JWT ───────────────────────────────────────────────────────
# Secret must be at least 256 bits for HS256 — keep this private in production
app.jwt.secret=RugbyPlannerUTMPiratesSecretKey2025SuperSecureBase64EncodedStringXYZ
# Token expiry: 24 hours in milliseconds
app.jwt.expiration-ms=86400000

# ── CORS ─────────────────────────────────────────────────────
# Vue dev server runs on 5173; adjust for production deployment
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000

# ── Ollama AI Engine ──────────────────────────────────────────
# Make sure Ollama is running: `ollama serve`
# Pull the model first: `ollama pull llama3.2`
ollama.api.url=http://localhost:11434
ollama.model=llama3.2
# Timeout in seconds for AI generation
# Meal plans (7-day, full macros) can take 3-4 minutes on llama3.2
ollama.timeout-seconds=240

# ── Admin seed account ────────────────────────────────────────
# Default admin credentials — change before production deployment
app.admin.username=AdminPiratesUTM
app.admin.email=AdminPiratesUTM@gmail.com
app.admin.password=Admin@1234
app.admin.fullName=System Administrator

# ── Email (UC010 — appointment notifications via Gmail SMTP) ─────────────────
# IMPORTANT: Use a Gmail App Password, NOT your main Gmail password.
# Steps: Google Account → Security → 2-Step Verification ON → App Passwords → generate one
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=AdminPiratesUTM@gmail.com
# Paste your 16-character Gmail App Password below (no spaces)
spring.mail.password=ycmgfepqhwpoorcs
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ── Logging ───────────────────────────────────────────────────
logging.level.com.utm.rugbyplanner=DEBUG
logging.level.org.springframework.security=WARN
logging.level.org.springframework.data.mongodb=WARN
